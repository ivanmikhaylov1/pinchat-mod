name: Build and Release

on:
  push:
    branches:
      - master
      - '1.*'
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - '1.*'

env:
  GRADLE_OPTS: '-Dorg.gradle.daemon=false'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Gradle Wrapper
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

  test:
    runs-on: ubuntu-latest
    needs: validate
    name: Run Tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Java Version
        id: java
        run: |
          MC=$(grep '^minecraft_version=' gradle.properties | cut -d= -f2)
          MAJOR=$(echo "$MC" | cut -d. -f2)
          if [ "$MAJOR" -ge 21 ]; then
            echo "version=21" >> "$GITHUB_OUTPUT"
          else
            echo "version=17" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ steps.java.outputs.version }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Run Fabric Tests
        run: ./gradlew :fabric:test

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.sha }}
          path: |
            fabric/build/reports/tests/
            fabric/build/test-results/

  build:
    runs-on: ubuntu-latest
    needs: test
    name: Build ${{ matrix.loader }}

    strategy:
      fail-fast: false
      matrix:
        loader: [fabric, forge]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Java Version
        id: java
        run: |
          MC=$(grep '^minecraft_version=' gradle.properties | cut -d= -f2)
          MAJOR=$(echo "$MC" | cut -d. -f2)
          if [ "$MAJOR" -ge 21 ]; then
            echo "version=21" >> "$GITHUB_OUTPUT"
          else
            echo "version=17" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ steps.java.outputs.version }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Build ${{ matrix.loader }}
        run: ./gradlew :${{ matrix.loader }}:build

      - name: Upload ${{ matrix.loader }} Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pinchat-${{ matrix.loader }}-${{ github.sha }}
          path: |
            ${{ matrix.loader }}/build/libs/*[!-sources].jar
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    name: Create Release

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Fabric Artifacts
        uses: actions/download-artifact@v4
        with:
          name: pinchat-fabric-${{ github.sha }}
          path: artifacts/fabric

      - name: Download Forge Artifacts
        uses: actions/download-artifact@v4
        with:
          name: pinchat-forge-${{ github.sha }}
          path: artifacts/forge

      - name: Get Version and MC Version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          MC=$(grep '^minecraft_version=' gradle.properties | cut -d= -f2)
          echo "VERSION=$TAG" >> "$GITHUB_OUTPUT"
          echo "MC_VERSION=$MC" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: PinChat v${{ steps.version.outputs.VERSION }}
          body: |
            ## PinChat v${{ steps.version.outputs.VERSION }}

            ### Downloads
            - **Fabric**: pinchat-mod-fabric.jar
            - **Forge**: pinchat-mod-forge.jar

            ### Requirements
            - Minecraft ${{ steps.version.outputs.MC_VERSION }}
            - See README for loader version requirements

            ---
            See [README](https://github.com/ivanmikhaylov1/pinchat-mod#readme) for installation instructions.
          files: |
            artifacts/**/*.jar
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
